name: Günlük Haber Güncelle

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  haber-uret:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri yükle
        run: pip install google-generativeai

      - name: Haberleri üret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python haberler_uret.py

      - name: Siteyi güncelle
        run: |
          git config user.name "Haber Botu"
          git config user.email "bot@haberler.com"
          git add haberler.html
          git diff --staged --quiet || git commit -m "🗞️ $(date +'%d.%m.%Y') haberleri güncellendi"
          git push
