<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bu Muydu? — Dijital Dergi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1008;font-family:'Georgia',serif;}

/* shelf texture bg */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 80%,rgba(120,60,0,0.3) 0%,transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 20%,rgba(80,30,0,0.25) 0%,transparent 60%),
    #1a1008;
  pointer-events:none;
}

/* ── TOP BAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;height:52px;z-index:100;
  background:rgba(15,8,2,0.95);border-bottom:1px solid rgba(255,200,80,0.15);
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;
}
.topbar-logo{
  font-family:'Georgia',serif;font-style:italic;font-size:22px;
  color:#f5e6c0;letter-spacing:1px;
}
.topbar-logo span{color:#e8a020;font-style:normal;font-weight:bold;}
.page-indicator{
  font-size:13px;color:rgba(245,230,192,0.5);letter-spacing:2px;
  font-family:monospace;
}

/* ── BOOK CONTAINER ── */
.scene{
  position:fixed;inset:0;top:52px;
  display:flex;align-items:center;justify-content:center;
  perspective:2000px;
}

.book-wrap{
  position:relative;
  width:min(780px, 90vw);
  height:min(90vh - 52px, 780px);
  transform-style:preserve-3d;
}

/* shadow under book */
.book-wrap::after{
  content:'';position:absolute;
  bottom:-30px;left:10%;right:10%;height:30px;
  background:radial-gradient(ellipse,rgba(0,0,0,0.7) 0%,transparent 70%);
  filter:blur(8px);
}

/* ── SPINE ── */
.spine{
  position:absolute;
  left:50%;top:5%;bottom:5%;
  width:14px;margin-left:-7px;
  background:linear-gradient(to right,#3d1f00,#7a3f0a,#3d1f00);
  z-index:10;
  box-shadow:0 0 20px rgba(0,0,0,0.8);
}

/* ── PAGE BASE ── */
.page{
  position:absolute;top:0;bottom:0;
  width:50%;
  overflow:hidden;
  transform-origin:right center;
  transform-style:preserve-3d;
  transition:transform 0.7s cubic-bezier(0.645,0.045,0.355,1.0), box-shadow 0.4s;
  cursor:pointer;
}
.page.left-side{
  left:0;
  transform-origin:right center;
  border-radius:4px 0 0 4px;
}
.page.right-side{
  left:50%;
  transform-origin:left center;
  border-radius:0 4px 4px 0;
}

.page img{
  width:100%;height:100%;
  object-fit:cover;display:block;
  pointer-events:none;
  backface-visibility:hidden;
}

/* page curl shadow */
.page.left-side::after{
  content:'';position:absolute;top:0;right:0;bottom:0;width:30px;
  background:linear-gradient(to left,rgba(0,0,0,0.35),transparent);
  pointer-events:none;
}
.page.right-side::after{
  content:'';position:absolute;top:0;left:0;bottom:0;width:30px;
  background:linear-gradient(to right,rgba(0,0,0,0.35),transparent);
  pointer-events:none;
}

/* ── FLIPPING ANIMATION ── */
.page.flip-left{
  transform:rotateY(-180deg);
  z-index:20;
  box-shadow:-20px 0 60px rgba(0,0,0,0.6);
}
.page.flip-right{
  transform:rotateY(180deg);
  z-index:20;
  box-shadow:20px 0 60px rgba(0,0,0,0.6);
}
.page.flipping-left{
  animation:flipLeft 0.7s cubic-bezier(0.645,0.045,0.355,1.0) forwards;
  z-index:30;
}
.page.flipping-right{
  animation:flipRight 0.7s cubic-bezier(0.645,0.045,0.355,1.0) forwards;
  z-index:30;
}

@keyframes flipLeft{
  0%{transform:rotateY(0deg);}
  50%{z-index:30;box-shadow:-30px 0 80px rgba(0,0,0,0.8);}
  100%{transform:rotateY(-180deg);}
}
@keyframes flipRight{
  0%{transform:rotateY(0deg);}
  50%{z-index:30;box-shadow:30px 0 80px rgba(0,0,0,0.8);}
  100%{transform:rotateY(180deg);}
}

/* back face of flipping page */
.page .page-back{
  position:absolute;inset:0;
  transform:rotateY(180deg);
  backface-visibility:hidden;
  overflow:hidden;
}
.page .page-back img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.page .page-front{
  position:absolute;inset:0;
  backface-visibility:hidden;
  overflow:hidden;
}
.page .page-front img{width:100%;height:100%;object-fit:cover;display:block;}

/* ── COVER PAGE (special) ── */
.cover-glow{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,160,0,0.08) 0%,transparent 60%);
  pointer-events:none;
  z-index:1;
}

/* ── NAVIGATION BUTTONS ── */
.nav-btn{
  position:fixed;
  top:50%;transform:translateY(-50%);
  width:48px;height:80px;
  background:rgba(15,8,2,0.85);
  border:1px solid rgba(255,200,80,0.2);
  color:#e8a020;
  font-size:28px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  z-index:50;
  transition:all 0.2s;
  user-select:none;
  -webkit-user-select:none;
}
.nav-btn:hover{background:rgba(232,160,32,0.15);border-color:rgba(255,200,80,0.5);}
.nav-btn:active{transform:translateY(-50%) scale(0.95);}
.nav-prev{left:12px;border-radius:0 4px 4px 0;}
.nav-next{right:12px;border-radius:4px 0 0 4px;}
.nav-btn.disabled{opacity:0.2;pointer-events:none;}

/* ── THUMBNAIL STRIP ── */
.thumbstrip{
  position:fixed;bottom:0;left:0;right:0;height:72px;z-index:80;
  background:rgba(10,5,0,0.95);
  border-top:1px solid rgba(255,200,80,0.1);
  display:flex;align-items:center;
  padding:0 60px;
  gap:6px;
  overflow-x:auto;
  scrollbar-width:thin;
  scrollbar-color:rgba(232,160,32,0.3) transparent;
}
.thumbstrip::-webkit-scrollbar{height:3px;}
.thumbstrip::-webkit-scrollbar-thumb{background:rgba(232,160,32,0.3);}

.thumb{
  flex-shrink:0;
  width:36px;height:52px;
  border:1.5px solid rgba(255,255,255,0.1);
  overflow:hidden;cursor:pointer;
  transition:all 0.2s;
  position:relative;
}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.thumb:hover{border-color:rgba(232,160,32,0.6);transform:translateY(-4px) scale(1.05);}
.thumb.active{border-color:#e8a020;transform:translateY(-6px) scale(1.08);}
.thumb-num{
  position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,0.7);
  font-size:8px;color:rgba(255,255,255,0.6);
  text-align:center;padding:1px 0;
  font-family:monospace;
}

/* ── EMPTY PAGE (cover back / last) ── */
.empty-page{
  width:100%;height:100%;
  background:linear-gradient(135deg,#2a1500,#1a0d00);
  display:flex;align-items:center;justify-content:center;
}
.empty-page-logo{
  font-family:'Georgia',serif;font-style:italic;
  font-size:clamp(28px,4vw,56px);
  color:rgba(232,160,32,0.25);
  text-align:center;line-height:1.2;
}

/* ── FLIP HINT ── */
.flip-hint{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:rgba(245,230,192,0.3);
  font-family:monospace;
  animation:fadeHint 3s 1.5s forwards;
  z-index:60;pointer-events:none;
}
@keyframes fadeHint{0%{opacity:1;}100%{opacity:0;display:none;}}

/* ── FULLSCREEN BTN ── */
.fs-btn{
  position:fixed;top:60px;right:16px;
  background:rgba(15,8,2,0.85);border:1px solid rgba(255,200,80,0.2);
  color:#e8a020;font-size:14px;padding:6px 10px;cursor:pointer;
  z-index:90;border-radius:3px;
  transition:all 0.2s;display:none;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">Bu <span>Muydu?</span></div>
  <div class="page-indicator" id="pg-indicator">Sayfa 1 / 13</div>
</div>

<!-- NAV BUTTONS -->
<button class="nav-btn nav-prev disabled" id="btn-prev" onclick="turnPage(-1)">‹</button>
<button class="nav-btn nav-next" id="btn-next" onclick="turnPage(1)">›</button>

<!-- BOOK SCENE -->
<div class="scene">
  <div class="book-wrap" id="bookwrap">

    <div class="spine"></div>

    <!-- LEFT PAGE -->
    <div class="page left-side" id="page-left" onclick="turnPage(-1)">
      <div class="page-front" id="pl-front">
        <div class="empty-page"><div class="empty-page-logo">Bu<br>Muydu?</div></div>
      </div>
      <div class="page-back" id="pl-back">
        <div class="empty-page"><div class="empty-page-logo">Bu<br>Muydu?</div></div>
      </div>
      <div class="cover-glow"></div>
    </div>

    <!-- RIGHT PAGE -->
    <div class="page right-side" id="page-right" onclick="turnPage(1)">
      <div class="page-front" id="pr-front">
        <img src="1.png" alt="Sayfa 1">
      </div>
      <div class="page-back" id="pr-back">
        <div class="empty-page"><div class="empty-page-logo">Bu<br>Muydu?</div></div>
      </div>
      <div class="cover-glow"></div>
    </div>

  </div>
</div>

<!-- THUMBNAIL STRIP -->
<div class="thumbstrip" id="thumbstrip">
</div>

<div class="flip-hint">← Sayfa çevirmek için tıkla →</div>

<script>
const TOTAL = 13;
const imgs = Array.from({length:TOTAL},(_,i)=>`${i+1}.png`);

/* 
  State: currentSpread
  spread 0  => left=empty,   right=img[0]   (cover)
  spread 1  => left=img[0],  right=img[1]
  spread 2  => left=img[1],  right=img[2]
  ...
  spread N  => left=img[N-1], right=img[N]
  spread 13 => left=img[12], right=empty    (back cover)
*/

let spread = 0;
let animating = false;

const plFront = document.getElementById('pl-front');
const plBack  = document.getElementById('pl-back');
const prFront = document.getElementById('pr-front');
const prBack  = document.getElementById('pr-back');
const pageLeft  = document.getElementById('page-left');
const pageRight = document.getElementById('page-right');
const indicator = document.getElementById('pg-indicator');
const btnPrev   = document.getElementById('btn-prev');
const btnNext   = document.getElementById('btn-next');

function imgEl(src){
  const img = document.createElement('img');
  img.src = src;
  img.alt = src;
  return img;
}

function emptyEl(){
  const d = document.createElement('div');
  d.className='empty-page';
  d.innerHTML='<div class="empty-page-logo">Bu<br>Muydu?</div>';
  return d;
}

function spreadContent(s){
  /* returns {left, right} — the DOM content for each face at spread s */
  return {
    left:  s === 0     ? emptyEl()        : imgEl(imgs[s-1]),
    right: s >= TOTAL  ? emptyEl()        : imgEl(imgs[s])
  };
}

function render(s){
  const c = spreadContent(s);
  plFront.innerHTML=''; plFront.appendChild(c.left.cloneNode(true));
  prFront.innerHTML=''; prFront.appendChild(c.right.cloneNode(true));
  /* backs are not normally visible, just reset */
  plBack.innerHTML=''; plBack.appendChild(emptyEl());
  prBack.innerHTML=''; prBack.appendChild(emptyEl());
  updateUI(s);
}

function updateUI(s){
  const pg = s===0?1:s>=TOTAL?TOTAL:s;
  indicator.textContent = `Sayfa ${pg} / ${TOTAL}`;
  btnPrev.classList.toggle('disabled', s===0);
  btnNext.classList.toggle('disabled', s>=TOTAL);
  document.querySelectorAll('.thumb').forEach((t,i)=>{
    t.classList.toggle('active', i===s-1 || (s===0&&i===0));
  });
  /* scroll active thumb into view */
  const activeThumb = document.querySelector('.thumb.active');
  if(activeThumb) activeThumb.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
}

function turnPage(dir){
  if(animating) return;
  const newSpread = spread + dir;
  if(newSpread < 0 || newSpread > TOTAL) return;

  animating = true;

  const next = spreadContent(newSpread);

  if(dir > 0){
    /* turn forward: right page flips left */
    prBack.innerHTML=''; prBack.appendChild(next.left.cloneNode(true));
    /* prepare incoming left page content (will appear after flip) */
    pageRight.classList.add('flipping-left');

    setTimeout(()=>{
      spread = newSpread;
      pageRight.classList.remove('flipping-left');
      render(spread);
      animating=false;
    },700);

  } else {
    /* turn backward: left page flips right */
    plBack.innerHTML=''; plBack.appendChild(next.right.cloneNode(true));
    pageLeft.classList.add('flipping-right');

    setTimeout(()=>{
      spread = newSpread;
      pageLeft.classList.remove('flipping-right');
      render(spread);
      animating=false;
    },700);
  }
}

/* Build thumbnails */
const strip = document.getElementById('thumbstrip');
imgs.forEach((src,i)=>{
  const t = document.createElement('div');
  t.className='thumb'+(i===0?' active':'');
  t.innerHTML=`<img src="${src}" alt="Sayfa ${i+1}"><div class="thumb-num">${i+1}</div>`;
  t.addEventListener('click',()=>{
    if(animating) return;
    const target = i+1;
    if(target === spread) return;
    /* jump directly */
    spread = target;
    render(spread);
  });
  strip.appendChild(t);
});

/* Keyboard */
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') turnPage(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') turnPage(-1);
});

/* Touch/swipe */
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx)>50){
    if(dx<0) turnPage(1);
    else turnPage(-1);
  }
},{passive:true});

/* Init */
render(0);
</script>
</body>
</html>
